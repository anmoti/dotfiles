# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

source = ~/.config/hypr/mocha.conf


# See https://wiki.hypr.land/Configuring/Keywords/

$lock = "hyprlock"
$terminal = "$HOME/.local/bin/term"
$fileManager = "nemo"
$menu = "fuzzel"
$browser = "floorp"

source = ~/.config/hypr/monitor.conf
source = ~/.config/hypr/bind.conf

#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# exec-once = nm-applet &
# exec-once = waybar & hyprpaper & firefox

exec-once = $terminal
exec-once = fcitx5 -d

exec-once = hyprpaper

exec = killall waybar; waybar
exec-once = nm-applet --indicator
exec-once = dunst &

exec-once = systemctl --user start hyprpolkitagent

exec-once = 1password --silent

env = GTK_THEME, Adwaita:dark # なぜかdconfで効かない (blueman-manager, nm-connection-edhitor)
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'

# gnome-keyring
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = gnome-keyring-daemon --start --components=secrets

#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24

#env = GTK_IM_MODULE,fcitx
#env = QT_IM_MODULE,fcitx
env = XMODIFIERS, @im=fcitx

# Fix JetBrains Window Scale
env = JAVA_TOOL_OPTIONS,-Dawt.toolkit.name=WLToolkit

###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 5
    gaps_out = 10

    border_size = 2

    # https://wiki.hypr.land/Configuring/Variables/#variable-types for info about colors
    #col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.active_border = rgba(94e2d5ee)
    col.inactive_border = rgba(595959aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = false

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 5
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 3
        passes = 1

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
animations {
    enabled = yes, please :)

    # Default curves, see https://wiki.hypr.land/Configuring/Animations/#curves
    #        NAME,           X0,   Y0,   X1,   Y1
    bezier = easeOutQuint,   0.23, 1,    0.32, 1
    bezier = easeInOutCubic, 0.65, 0.05, 0.36, 1
    bezier = linear,         0,    0,    1,    1
    bezier = almostLinear,   0.5,  0.5,  0.75, 1
    bezier = quick,          0.15, 0,    0.1,  1

    # Default animations, see https://wiki.hypr.land/Configuring/Animations/
    #           NAME,          ONOFF, SPEED, CURVE,        [STYLE]
    animation = global,        1,     10,    default
    animation = border,        1,     5.39,  easeOutQuint
    animation = windows,       1,     4.79,  easeOutQuint
    animation = windowsIn,     1,     4.1,   easeOutQuint, popin 87%
    animation = windowsOut,    1,     1.49,  linear,       popin 87%
    animation = fadeIn,        1,     1.73,  almostLinear
    animation = fadeOut,       1,     1.46,  almostLinear
    animation = fade,          1,     3.03,  quick
    animation = layers,        1,     3.81,  easeOutQuint
    animation = layersIn,      1,     4,     easeOutQuint, fade
    animation = layersOut,     1,     1.5,   linear,       fade
    animation = fadeLayersIn,  1,     1.79,  almostLinear
    animation = fadeLayersOut, 1,     1.39,  almostLinear
    animation = workspaces,    1,     1.94,  almostLinear, fade
    animation = workspacesIn,  1,     1.21,  almostLinear, fade
    animation = workspacesOut, 1,     1.94,  almostLinear, fade
    animation = zoomFactor,    1,     7,     quick
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
#  background_color = 0xffffff
  force_default_wallpaper = 0 # Set to 0 or 1 to disable the anime mascot wallpapers
#  disable_hyprland_logo = true # If true disables the random hyprland logo / anime girl background. :(
}


##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

layerrule {
  name = "enable-blur-waybar"
  match:namespace = waybar
  blur = true
}

# https://github.com/hyprwm/Hyprland/blob/de3471b/src/desktop/Workspace.hpp#L13-L18
$FSMODE_NONE = 0
$FSMODE_MAXIMIZED = 1
$FSMODE_FULLSCREEN = 2

# Fix XWayland drag issues (e.g. DnD overlays with no class/title)
windowrule {
    name = fix-xwayland-drag
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false
    no_focus = true
}

windowrule {
    name = global-behavior
    match:class = .*
    opacity = 0.97 0.93
    # 最大化要求を抑制 (アプリは強制的には全画面表示にならない)
    suppress_event = maximize
    focus_on_activate = true
}

windowrule {
    name = disable-opacity-when-fullscreen
    match:fullscreen_state_client = $FSMODE_FULLSCREEN
    opacity = 1.00
}

windowrule {
    name = use-app-styled-opacity
    match:class = Alacritty|legcord|floorp
    opacity = 1.00 0.95
}

windowrule {
  name = float-floorp-popup
  match:class = floorp
  match:initial_title = negative:Ablaze Floorp
  float = true
}

windowrule {
    name = vivaldi-bitwarden
    match:class = vivaldi-.+
    match:title = Bitwarden - Vivaldi
    float = true
}

windowrule {
    name = youtube-music
    match:class = com.github.th_ch.youtube_music
    opacity = 0.90 0.85
    monitor = 0
    workspace = 9
}

windowrule {
    name = jquake
    match:class = net-jquake-app-Main
    match:title = JQuake # 設定ウィンドウに影響を与えないため指定
    float = false
    opacity = 0.90 0.85
    monitor = 0
    workspace = 10
}

windowrule {
    name = blueman-manager
    match:class = blueman-manager
    float = true
    size = 700 400
}

windowrule {
    name = alacritty-mode-float
    match:class = AlacrittyFloat
    float = true
}

windowrule {
    name = imhex
    match:class = imhex
    float = false
}

windowrule {
  name = 1password
  match:class = 1password
  float = true
  center = true
}

windowrule {
    name = burp-suite-filter
    match:title = HTTP history filter
    float = true
    size = 1100 320
}

windowrule {
    name = filemanager
    match:class = nemo|org.gnome.FileRoller
    float = true
    size = 900 600
}

windowrule {
    name = setting-float
    match:title = .*([Ss]etting|設定).*
    float = true
}

env = ELECTRON_OZONE_PLATFORM_HINT,auto
xwayland {
    force_zero_scaling = true
}

###############
### PLUGINS ###
###############

exec-once = hyprpm reload

plugin {
    hyprbars {
        enabled = true

        bar_color = rgba($surface0Alphabe)
        bar_blur = true
        bar_height = 24

        bar_title_enabled = true
        bar_text_size = 10
        col.text = $text
        bar_text_font = "JetBrainsMono"
        bar_text_align = "center"

        bar_buttons_alignment = "right"
        inactive_button_color = $subtext0
        hyprbars-button = $red,    12, , hyprctl dispatch killactive
        hyprbars-button = $yellow, 12, , hyprctl dispatch fullscreen 1
        on_double_click = hyprctl dispatch togglefloating

        bar_part_of_window = true
        bar_precedence_over_border = false
    }
}

# hyprctl keyword 'windowrule[disable-hyprbars]:enable false'
windowrule {
    name = disable-hyprbars
    enable = true
    match:float = false
    hyprbars:no_bar = true
}
